<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap">
    <script src="https://kit.fontawesome.com/353bd79a2e.js" crossorigin="anonymous"></script>
    <script defer src="script.js"></script>
    <link rel="icon" type="image/ong"
        href="https://res.cloudinary.com/dbiav4ehm/image/upload/v1781888406/quiz-logo-icon-symbol-flat-cartoon-bubble-speeches-with-question-and-check-mark-signs-as-competition-game-or-interview-logotype-poll-questionnaire-insignia-isolated-vector_gmmwvq.jpg">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["DM Sans", "sans-serif"],
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans min-h-screen flex flex-col items-center justify-center bg-[#F3F4F6]">

    <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-1">Knowledge check</p>
    <p class="font-bold text-[26px] text-[#5045E7] mb-5">Simple Quiz</p>

    <div id="prog" class="w-[440px] max-w-full h-1.5 bg-gray-200 rounded-full mb-5 overflow-hidden">
        <div id="progressBar" class="h-full rounded-full bg-[#5045E7] transition-all duration-500" style="width: 0%">
        </div>
    </div>

    <div id="container"
        class="bg-white px-7 py-7 flex flex-col gap-4 rounded-2xl border border-gray-200 w-[440px] max-w-full relative shadow-xl">

        <div id="quizBody">
            <div class="flex items-center justify-between mb-4">
                <span class="text-[13px] font-medium text-gray-400" id="counter">1 / 10</span>
                <span class="text-[13px] font-medium text-gray-400">Score: <span id="score"
                        class="text-[#5045E7] font-bold">0</span></span>
            </div>

            <div id="questionHeader"></div>

            <div id="options"></div>

            <div class="flex justify-end mt-6">
                <button id="next"
                    class="flex items-center gap-2 px-5 py-2 rounded-full bg-[#5045E7] text-white text-sm font-medium hover:bg-[#403ED0] transition-colors duration-200">
                    Next <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>
        </div>

        <!--quiz complete-->
        <div class="text-center py-4 hidden" id="completed">
            <div class="w-14 h-14 rounded-full bg-[#EEEDFE] flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-trophy text-[#5045E7] text-2xl"></i>
            </div>
            <p class="text-[18px] font-medium text-gray-900 mb-1">Quiz complete!</p>
            <p class="text-sm text-gray-400 mb-6">Here's how you did</p>

            <div class="grid grid-cols-2 gap-3 mb-5">
                <div class="bg-gray-100 rounded-xl p-4">
                    <p class="text-[11px] text-gray-400 uppercase tracking-wide mb-1">Score</p>
                    <p class="text-2xl font-medium text-gray-900" id="scoreLabel"></p>
                </div>
                <div class="bg-gray-100 rounded-xl p-4">
                    <p class="text-[11px] text-gray-400 uppercase tracking-wide mb-1">Accuracy</p>
                    <p class="text-2xl font-medium text-gray-900" id="percent"></p>
                </div>
            </div>

            <button onclick="restartQuiz()"
                class="w-full py-2.5 text-sm border border-gray-200 rounded-xl bg-white hover:bg-gray-50 cursor-pointer flex items-center justify-center gap-2 transition-colors">
                <i class="fa-solid fa-arrows-rotate text-gray-500"></i> Try again
            </button>
            <button onclick="reviewAns()"
                class="w-full py-2.5 mt-2 text-sm text-white border border-gray-200 rounded-xl bg-[#5045E7] hover:bg-[#403ED0] transition-colors duration-200 cursor-pointer flex items-center justify-center gap-2">
                <i class="fa-solid fa-magnifying-glass text-white"></i> Review Answers
            </button>
        </div>

        <!--review-->
        <div id="reviewScreen" class="hidden">
            <div id="reviewContainer" class="flex flex-col gap-3 max-h-[400px] overflow-y-auto"></div>
            <button onclick="restartQuiz()"
                class="w-full mt-4 py-2.5 text-sm border border-gray-200 rounded-xl bg-white hover:bg-gray-50 cursor-pointer flex items-center justify-center gap-2 transition-colors">
                <i class="fa-solid fa-arrows-rotate text-gray-500"></i> Try again
            </button>
        </div>

    </div>

    <!--custom alert-->
    <div id="unanswered" class="hidden fixed bottom-5 right-5 bg-white shadow-lg rounded-xl px-4 py-3 border border-gray-100
            translate-y-5 opacity-0 transition-all duration-200 flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation text-[#D85A30]"></i>
        <span class="text-sm font-medium">Please pick an answer first</span>
    </div>

</body>

</html>
